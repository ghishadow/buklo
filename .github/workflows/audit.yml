name: Run cargo-audit
on:
    pull_request:
        paths:
            - "**/Cargo.toml"
            - "**/Cargo.lock"
    push:
        paths:
            - "**/Cargo.toml"
            - "**/Cargo.lock"
    schedule:
        - cron: "0 0 * * *"
jobs:
    security_audit:
        runs-on: ubuntu-26.04
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
            - uses: rustsec/audit-check@v2.0.0
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
